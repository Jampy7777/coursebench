name = "coursebench-proxy"
main = "src/proxy/worker.js"
compatibility_date = "2024-11-01"

# Non-secret config:
[vars]
SUPABASE_URL = "https://YOUR-PROJECT.supabase.co"
JIG_BASE_URL = "https://coursebench.sixredmarbles.com/jigs"

# Secrets — set via the CLI, never commit:
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put SUPABASE_SERVICE_KEY
#
# Route (after deploy): bind to e.g. proxy.coursebench.sixredmarbles.com
# Rate limiting: add a Cloudflare Rate Limiting rule on the route, or wire a
# Durable Object / KV counter into deps.checkRateLimit.
